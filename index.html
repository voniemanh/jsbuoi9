<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý nhân viên</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />

    <!-- Bootstrap 4 -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />

    <!-- JQuery UI -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/themes/base/jquery-ui.min.css"
    />

    <!-- My CSS -->
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/style4.css" />
    <link rel="stylesheet" type="text/css" href="css/main.css" />
  </head>

  <body>
    <div class="wrapper">
      <!-- Sidebar Holder -->
      <nav id="sidebar">
        <div class="sidebar-header">
          <h3>Bootstrap Sidebar</h3>
          <strong>BS</strong>
        </div>

        <ul class="list-unstyled components">
          <li class="active">
            <a href="#homeSubmenu">
              <i class="fa fa-home"></i>
              Home
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fa fa-briefcase"></i>
              About
            </a>
            <a href="#pageSubmenu">
              <i class="fa fa-files-o"></i>
              Pages
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fa fa-link"></i>
              Portfolio
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fa fa-paperclip"></i>
              FAQ
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fa fa-paper-plane"></i>
              Contact
            </a>
          </li>
        </ul>

        <ul class="list-unstyled CTAs">
          <li>
            <a
              href="https://bootstrapious.com/tutorial/files/sidebar.zip"
              class="download"
              >Download source</a
            >
          </li>
          <li>
            <a
              href="https://bootstrapious.com/p/bootstrap-sidebar"
              class="article"
              >Back to article</a
            >
          </li>
        </ul>
      </nav>

      <!-- Page Content Holder -->
      <div id="content">
        <nav class="navbar navbar-default">
          <div class="container-fluid">
            <div class="navbar-header">
              <button
                type="button"
                id="sidebarCollapse"
                class="btn btn-info navbar-btn"
              >
                <i class="glyphicon glyphicon-align-left"></i>
                <span>Toggle Sidebar</span>
              </button>
            </div>

            <div
              class="collapse navbar-collapse"
              id="bs-example-navbar-collapse-1"
            >
              <ul class="nav navbar-nav navbar-right">
                <li><a href="#">Page</a></li>
                <li><a href="#">Page</a></li>
                <li><a href="#">Page</a></li>
                <li><a href="#">Page</a></li>
              </ul>
            </div>
          </div>
        </nav>

        <div class="container">
          <div class="card text-center">
            <!-- Header -->
            <div class="card-header myCardHeader">
              <div class="row">
                <div class="col-md-6">
                  <h3 class="text-left text-primary font-weight-bold">
                    Danh sách nhân viên
                  </h3>
                </div>
                <div class="col-md-6 text-right">
                  <button class="btn btn-primary" id="btnAdd">
                    Thêm nhân viên
                  </button>
                </div>
              </div>
            </div>

            <!-- Body -->
            <div class="card-body">
              <!-- ===== Hàng tìm kiếm + filter ===== -->
              <div class="row mb-3">
                <!-- Tìm kiếm theo tên / chức vụ -->
                <div class="col-md-6">
                  <div class="input-group">
                    <input
                      type="text"
                      class="form-control"
                      placeholder="Tìm theo tên hoặc chức vụ..."
                      id="searchName"
                    />
                    <div class="input-group-append">
                      <span
                        class="input-group-text"
                        id="btnSearchEmployee"
                        style="cursor: pointer"
                      >
                        <i class="fa fa-search"></i>
                      </span>
                    </div>
                  </div>
                </div>

                <!-- Dropdown lọc theo xếp loại nhân viên -->
                <div class="col-md-4">
                  <select class="form-control" id="filterType">
                    <option value="">-- Tất cả xếp loại --</option>
                    <option value="Xuất sắc">Xuất sắc (≥ 192 giờ)</option>
                    <option value="Giỏi">Giỏi (≥ 176 giờ)</option>
                    <option value="Khá">Khá (≥ 160 giờ)</option>
                    <option value="Trung bình">
                      Trung bình (dưới 160 giờ)
                    </option>
                  </select>
                </div>

                <!-- Nút reset filter -->
                <div class="col-md-2">
                  <button
                    class="btn btn-secondary btn-block"
                    id="btnResetFilter"
                  >
                    <i class="fa fa-refresh"></i> Reset
                  </button>
                </div>
              </div>

              <!-- Bảng nhân viên -->
              <table class="table table-bordered table-hover myTable">
                <thead class="text-primary">
                  <tr>
                    <th class="nowrap">
                      <span class="mr-1">Tài khoản</span>
                      <i
                        class="fa fa-arrow-up"
                        id="sortAsc"
                        style="cursor: pointer"
                      ></i>
                      <i
                        class="fa fa-arrow-down"
                        id="sortDesc"
                        style="cursor: pointer"
                      ></i>
                    </th>
                    <th>Họ và tên</th>
                    <th>Email</th>
                    <th>Ngày làm</th>
                    <th>Chức vụ</th>
                    <th>Tổng lương</th>
                    <th>Xếp loại</th>
                    <th><em class="fa fa-cog"></em></th>
                  </tr>
                </thead>
                <tbody id="tableEmployeeList"></tbody>
              </table>
            </div>

            <!-- Footer -->
            <div class="card-footer myCardFooter">
              <nav>
                <ul
                  class="pagination justify-content-center"
                  id="ulPagination"
                ></ul>
              </nav>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- The Modal -->
    <div class="modal fade" id="myModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <header class="head-form mb-0">
            <h2 id="headerTitle">Thêm nhân viên</h2>
          </header>

          <!-- Modal body -->
          <div class="modal-body">
            <form role="form">
              <div class="form-group">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <span class="input-group-text"
                      ><i class="fa fa-user"></i
                    ></span>
                  </div>
                  <input
                    type="text"
                    name="tk"
                    id="username"
                    class="form-control input-sm"
                    placeholder="Tài khoản"
                  />
                </div>
                <span class="sp-thongbao" id="notifyUsername"></span>
              </div>

              <div class="form-group">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <span class="input-group-text"
                      ><i class="fa fa-address-book"></i
                    ></span>
                  </div>
                  <input
                    type="text"
                    name="name"
                    id="fullName"
                    class="form-control input-sm"
                    placeholder="Họ và tên"
                  />
                </div>
                <span class="sp-thongbao" id="notifyFullName"></span>
              </div>

              <div class="form-group">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <span class="input-group-text"
                      ><i class="fa fa-envelope"></i
                    ></span>
                  </div>
                  <input
                    type="email"
                    name="email"
                    id="email"
                    class="form-control input-sm"
                    placeholder="Email"
                  />
                </div>
                <span class="sp-thongbao" id="notifyEmail"></span>
              </div>

              <div class="form-group">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <span class="input-group-text"
                      ><i class="fa fa-key"></i
                    ></span>
                  </div>
                  <input
                    type="password"
                    name="password"
                    id="password"
                    class="form-control input-sm"
                    placeholder="Mật khẩu"
                  />
                </div>
                <span class="sp-thongbao" id="notifyPassword"></span>
              </div>

              <div class="form-group">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <span class="input-group-text"
                      ><i class="fa fa-calendar"></i
                    ></span>
                  </div>
                  <input
                    type="text"
                    name="ngaylam"
                    id="datepicker"
                    class="form-control"
                    placeholder="Ngày làm (mm/dd/yyyy)"
                  />
                </div>
                <span class="sp-thongbao" id="notifyDate"></span>
              </div>

              <div class="form-group">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <span class="input-group-text"
                      ><i class="fa fa-money" aria-hidden="true"></i
                    ></span>
                  </div>
                  <input
                    type="text"
                    name="luongCB"
                    id="baseSalary"
                    class="form-control input-sm"
                    placeholder="Lương cơ bản"
                  />
                </div>
                <span class="sp-thongbao" id="notifyBaseSalary"></span>
              </div>

              <div class="form-group">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <span class="input-group-text"
                      ><i class="fa fa-briefcase"></i
                    ></span>
                  </div>
                  <select class="form-control" id="position">
                    <option>Chọn chức vụ</option>
                    <option>Giám đốc</option>
                    <option>Trưởng Phòng</option>
                    <option>Nhân Viên</option>
                  </select>
                </div>
                <span class="sp-thongbao" id="notifyPosition"></span>
              </div>

              <div class="form-group">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <span class="input-group-text"
                      ><i class="fa fa-clock-o" aria-hidden="true"></i
                    ></span>
                  </div>
                  <input
                    type="text"
                    name="gioLam"
                    id="workHours"
                    class="form-control input-sm"
                    placeholder="Giờ làm"
                  />
                </div>
                <span class="sp-thongbao" id="notifyWorkHours"></span>
              </div>
            </form>
          </div>

          <!-- Modal footer -->
          <div class="modal-footer" id="modalFooter">
            <!-- Nút thêm: chỉ hiện khi mode = add -->
            <button id="btnAddEmployee" type="button" class="btn btn-success">
              Thêm người dùng
            </button>
            <!-- Nút cập nhật: chỉ hiện khi mode = edit -->
            <button id="btnUpdate" type="button" class="btn btn-primary">
              Cập nhật
            </button>
            <button
              id="btnClose"
              type="button"
              class="btn btn-danger"
              data-dismiss="modal"
            >
              Đóng
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap -->
    <script src="js/jquery.min.js"></script>
    <script type="text/javascript" src="js/jquery.easing.min.js"></script>
    <script type="text/javascript" src="js/popper.min.js"></script>
    <script type="text/javascript" src="js/bootstrap.min.js"></script>

    <!-- Date Picker -->
    <script src="./js/jquery-ui.js"></script>
    <script src="js/datepicker.js"></script>

    <script type="text/javascript">
      $(document).ready(function () {
        $("#sidebarCollapse").on("click", function () {
          $("#sidebar").toggleClass("active");
        });
      });
    </script>

    <script src="./js/index.js"></script>

    <!-- Reset filter button -->
    <script>
      document
        .getElementById("btnResetFilter")
        .addEventListener("click", function () {
          document.getElementById("searchName").value = "";
          document.getElementById("filterType").value = "";
          // gọi lại applyFilters nếu đã load xong
          if (typeof applyFilters === "function") applyFilters();
        });
    </script>
  </body>
</html>
